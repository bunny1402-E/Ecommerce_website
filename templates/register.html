<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | QuantumCart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="glass-card p-5 w-100" style="max-width: 500px;">
            <div class="text-center mb-4">
                <a href="/store" class="text-decoration-none"><h2 class="glowing-text fw-bold mb-3">QuantumCart</h2></a>
                <h4 class="text-white">Create an Account</h4>
            </div>
            
            <form method="POST" action="/register">
                <div class="mb-3">
                    <label class="form-label text-light">Full Name</label>
                    <input type="text" name="name" class="form-control form-control-quantum rounded-pill px-4 py-2" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-light">Email Address</label>
                    <input type="email" name="email" class="form-control form-control-quantum rounded-pill px-4 py-2" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-light">Password</label>
                    <input type="password" name="password" class="form-control form-control-quantum rounded-pill px-4 py-2" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fs-5 shadow-lg mt-2">Sign Up</button>
            </form>
            
            <div class="mt-4 text-center">
                <p class="text-light opacity-75">Already have an account? <a href="/login" class="text-info fw-bold text-decoration-none">Login here.</a></p>
            </div>
        </div>
    </div>
</body>
</html>
