<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome to QuantumCart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        
        .hero-section {
            /* A deep, modern tech gradient background */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .glowing-text {
            font-size: 6rem;
            font-weight: 900;
            letter-spacing: 2px;
  
            background: linear-gradient(to right, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
       
            opacity: 0;
            animation: slideUpFade 1.5s ease-out forwards;
        }

        .action-buttons {
            margin-top: 30px;
            opacity: 0;
        
            animation: fadeIn 1s ease-out 1s forwards; 
        }

        .btn-custom {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            transition: transform 0.3s ease;
        }

        .btn-custom:hover {
            transform: scale(1.05);
        }

        /* Keyframes for the animations */
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(50px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <h1 class="glowing-text">QuantumCart</h1>
        
        <div class="action-buttons">
            {% if session.get('user_id') %}
                <p class="text-light mb-4 fs-4">Discover a smarter way to shop. Endless variety, seamless checkout.</p>
                <a href="/store" class="btn btn-primary btn-custom shadow-lg">Enter Store</a>
                <a href="/dashboard" class="btn btn-outline-light btn-custom ms-3">Dashboard</a>
            {% else %}
                <p class="text-light mb-4 fs-4">Discover a smarter way to shop. Endless variety, seamless checkout.</p>
                <a href="/login" class="btn btn-primary btn-custom shadow-lg">Login</a>
                <a href="/register" class="btn btn-outline-light btn-custom ms-3">Register</a>
                <br><br>
                <a href="/store" class="text-light text-decoration-none" style="opacity: 0.7; font-size: 0.9rem;">or browse as a guest</a>
            {% endif %}
        </div>
    </div>

</body>
</html>
