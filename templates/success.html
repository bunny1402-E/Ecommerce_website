<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Successful | QuantumCart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
    <style>
        .success-icon {
            font-size: 80px;
            color: #00c6ff;
            margin-bottom: 20px;
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .success-card {
            max-width: 600px;
            margin: 10vh auto;
            text-align: center;
            padding: 50px 30px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-quantum mb-4">
        <div class="container">
            <a class="navbar-brand glowing-text fw-bold" href="/store">QuantumCart</a>
            <div class="ms-auto">
                <a href="/dashboard" class="btn btn-outline-info me-2">Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="glass-card success-card">
            <div class="success-icon">✓</div>
            <h1 class="glowing-text mb-4">Order Placed Successfully!</h1>
            <p class="fs-5 text-light mb-5">Thank you for your purchase. Your items will be dispatched shortly.</p>
            
            <div>
                <a href="/store" class="btn btn-primary btn-lg rounded-pill px-4 me-3">Continue Shopping</a>
                <a href="/dashboard" class="btn btn-outline-light btn-lg rounded-pill px-4">View Account</a>
            </div>
        </div>
    </div>

</body>
</html>
