<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | QuantumCart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-quantum mb-5 sticky-top">
        <div class="container">
            <a class="navbar-brand glowing-text fw-bold" href="/store">QuantumCart</a>
        </div>
    </nav>

    <div class="container">
        <div class="glass-card p-5 text-center mx-auto" style="max-width: 600px;">
            <div class="fs-1 mb-3">👋</div>
            <h2 class="mb-4">Welcome back, <span class="glowing-text">{{ name }}</span>!</h2>
            <p class="text-light mb-5 fs-5">You are securely logged in to your QuantumCart account.</p>
            
            <div class="d-flex justify-content-center flex-wrap gap-3 mt-4">
                <a href="/store" class="btn btn-primary btn-lg rounded-pill px-4 shadow-sm">Continue Shopping</a>
                <a href="/cart" class="btn btn-outline-info btn-lg rounded-pill px-4">View My Cart</a>
                <a href="/logout" class="btn btn-outline-danger btn-lg rounded-pill px-4 ms-md-auto">Logout</a>
            </div>
        </div>
    </div>
</body>
</html>
