<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QuantumCart | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/store">QuantumCart</a>
            <div class="ms-auto">
                {% if session.get('user_id') %}
                    <a href="/dashboard" class="btn btn-outline-info me-2">My Dashboard</a>
                {% else %}
                    <a href="/login" class="btn btn-outline-info me-2">Login</a>
                {% endif %}
                
                <a href="/cart" class="btn btn-outline-light">
                    Cart <span class="badge bg-danger" id="cart-badge">{{ cart_count }}</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            {% for product in products %}
            <div class="col-md-3 mb-4">
                <div class="card h-100 shadow-sm">
                    <img src="{{ product.ImageURL }}" class="card-img-top p-3" alt="Product Image" style="height: 200px; object-fit: contain;">
                    
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title">{{ product.Title }}</h6>
                        <p class="card-text text-success fw-bold">${{ product.Price }}</p>
                        
<button onclick="addToCart('{{ product.ProductID }}', this)" class="btn btn-primary mt-auto">Add to Cart</button>                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
<script>
        function addToCart(productId, buttonElement) {

            let originalText = buttonElement.innerText;
            

            buttonElement.innerText = "Adding...";
            buttonElement.classList.replace('btn-primary', 'btn-success');

            fetch('/add_to_cart/' + productId)
                .then(response => response.json())
                .then(data => {
                    if(data.success) {
                
                        document.getElementById('cart-badge').innerText = data.cart_count;
                        
                   
                        setTimeout(() => {
                            buttonElement.innerText = originalText;
                            buttonElement.classList.replace('btn-success', 'btn-primary');
                        }, 500);
                    }
                })
                .catch(error => console.error('Error adding to cart:', error));
        }
    </script>
</body>
</html>
